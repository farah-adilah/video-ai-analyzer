syntax = "proto3";

package video_analyzer;

service VideoAnalyzer {
  rpc AnalyzeVideo(VideoRequest) returns (stream AnalysisUpdate);
  rpc GenerateReport(ReportRequest) returns (ReportResponse);
}

message VideoRequest {
  bytes video_data = 1;
  string video_name = 2;
  repeated string analysis_types = 3;  // ["transcription", "vision", "objects"]
}

message AnalysisUpdate {
  string stage = 1;  // "transcription", "vision", "generation"
  int32 progress = 2;
  string message = 3;
  string result_json = 4;
}

message ReportRequest {
  string analysis_id = 1;
  string format = 2;  // "pdf" or "pptx"
}

message ReportResponse {
  bytes report_data = 1;
  string filename = 2;
}